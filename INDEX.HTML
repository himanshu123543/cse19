<!DOCTYPE html>
<html>
 <head>
 <tittle>Student Registeration Form</tittle>
 </head>

    <body bgcolor="MistyRose">

    <form>
     <table allign="center" width="700" cellpadding="10">
 
     <tr>
    <td  colspan="2" align="center">
        <h1>Student Registration Form</h1>
    </td>
    </tr>

   <tr>
    <td>Student name :</td>
    <td>
        <input type="text" size="21" placeholder="First name"/>
        -
        <input type="text" size="21" placeholder="Last name"/>
    </td>
    <tr/>

    <tr>
    <td>Father's name :</td>
    <td><input type="text" size="50"/></td>
    </tr>

    <tr>
        <td>Date of birth :</td>
        <td>
            <input type="text" size="3" placeholder="Day"/> -
            <input type="text" size="3" placeholder="Month"/> -
            <input type="text" size="3" placeholder="Year"/>
            <i>(DD-MM-YYYY)</i>
        </td>
    </tr>

    <tr>
        <td>Mobile no. :</td>
        <td>
            <input type="text" size="1" value="+91"/> - 
            <input type="text" size="42" />
        </td>
    </tr>

    <tr>
        <td>Email id :</td>
        <td><input type="text" size="50"/></td>
    </tr>

    <tr>
        <td>Password :</td>
        <td><input type="password" size="50"/></td>
        </tr>

        <tr>
            <td>Gender :</td>
            <td>
                <input type="radio" name="g"/> Male
                <input type="radio" name="g"/> Female
            </td>
        </tr>

        <tr>
            <td>Depertment :</td>
            <td>
                <input type="checkbox"/> CSE
                <input type="checkbox"/> IT
                <input type="checkbox"/> ECE
                <input type="checkbox"/> Mech
                <input type="checkbox"/> Civil
            </td>
        </tr>

        <tr>
            <td>Studeny photo  :</td>
            <td><input type="file"/></td>
        </tr>
    
        <tr>
            <td>City :</td>
            <td><input type="text" size="50"/></td>
        </tr>

        <tr>
            <td>Address:</td>
            <td><textarea cols="48" rows="5"></textarea></td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="summit" align="center" value="Register"/>
            </td>
        </tr>

        </td>
    </tr>
    </table>
    </form>
</html>
</body>
